name: Check Stale Assignments

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  check-stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check assigned issues for inactivity
        uses: actions/github-script@v7
        with:
          script: |
            const twoDaysInMs = 2 * 24 * 60 * 60 * 1000;
            const fourDaysInMs = 4 * 24 * 60 * 60 * 1000;
            const now = new Date();

            // Fetch all open issues (GitHub API paginates, so we handle it)
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            for (const issue of openIssues) {
              // Skip pull requests
              if (issue.pull_request) continue;
              // Skip unassigned issues
              if (!issue.assignees || issue.assignees.length === 0) continue;

              const assignee = issue.assignees[0].login; // Assuming 1 assignee per issue

              // Fetch events for the issue to find when it was assigned
              const events = await github.paginate(github.rest.issues.listEvents, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100
              });

              // Find the latest assignment event for this user
              const assignEvents = events.filter(e => e.event === 'assigned' && e.assignee && e.assignee.login === assignee);
              if (assignEvents.length === 0) continue;

              const latestAssignEvent = assignEvents[assignEvents.length - 1];
              const assignTime = new Date(latestAssignEvent.created_at);
              const timeSinceAssigned = now - assignTime;

              // Check if 2 days have passed since assignment
              if (timeSinceAssigned >= twoDaysInMs) {
                // Check if the assignee has commented since assignment
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  since: latestAssignEvent.created_at
                });

                const assigneeComments = comments.filter(c => c.user.login === assignee);
                
                // If the assignee has commented recently, reset the clock (sort of) by ignoring this issue.
                // We'll only complain if they haven't communicated at all since assignment.
                if (assigneeComments.length > 0) continue;

                // Check if we already warned them
                const botComments = comments.filter(c => c.user.type === 'Bot' && c.body.includes("what's the update"));

                if (timeSinceAssigned >= fourDaysInMs) {
                  // 4 Days passed without activity: Unassign
                  await github.rest.issues.removeAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    assignees: [assignee]
                  });

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `@${assignee}, this issue has been unassigned due to 4 days of inactivity since assignment. It is now open for others to claim.`
                  });
                  
                  console.log(`Unassigned ${assignee} from issue #${issue.number}`);
                } 
                else if (botComments.length === 0) {
                  // 2 Days passed without activity: Warn
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `@${assignee}, what's the update? It has been 2 days since you were assigned. Please let us know if you are still working on this and submit a PR soon.`
                  });
                  
                  console.log(`Warned ${assignee} on issue #${issue.number}`);
                }
              }
            }
